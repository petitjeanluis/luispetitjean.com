<header>
  <nav [ngClass]="{'mobile-menu-color': hamburgerOpen}">
    <a [ngClass]="{'hide': showDark}" id="brand" href="#"><img class="logo" src="/assets/white-logo.png" width="42px"/></a>
    <a [ngClass]="{'hide': !showDark}" id="brand" href="#"><img class="logo" src="/assets/blue-logo.png" width="42px"/></a>
    
    <ul id="menu">
      <li><a href="/#home">Home</a></li>
      <li><a href="/#about">About</a></li>
      <li><a href="/blogs">Blogs</a></li>
    </ul>

    <i class="fa fa-2x" [ngClass]="{'white': !showDark, 'dark-blue': showDark, 'fa-navicon': !hamburgerOpen, 'fa-times': hamburgerOpen}" id="hamburger" (click)="onClickHamburger()"></i>
  </nav>
</header>

<div *ngIf="hamburgerOpen" class="mobile-menu-container mobile-menu-color">

  <div class="mobile-menu">
    <a href="/#home">Home</a>
    <a href="/#about">About</a>
    <a href="/blogs">Blogs</a>
  </div>

</div>
